<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GPS Tracker">
<title>GPS Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --red: #D85A30;
    --blue: #378ADD;
    --bg: #f5f5f0;
    --surface: #ffffff;
    --surface2: #f0efea;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a18;
    --text2: #666660;
    --text3: #999993;
    --radius: 14px;
    --radius-sm: 8px;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: -apple-system, 'Hiragino Sans', sans-serif; }
  #app { display: flex; flex-direction: column; height: 100dvh; height: -webkit-fill-available; }

  /* Header */
  #header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 12px 16px 10px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  #header h1 { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  #header .badge {
    font-size: 10px; font-weight: 700; padding: 3px 8px;
    border-radius: 20px; background: #e8f5ef; color: var(--green);
    letter-spacing: 0.3px;
  }

  /* Map */
  #map { flex: 1; min-height: 0; }
  .leaflet-control-zoom { border: none !important; box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important; }
  .leaflet-control-zoom a { border: none !important; border-bottom: 0.5px solid var(--border) !important; font-size: 16px !important; width: 36px !important; height: 36px !important; line-height: 36px !important; }

  /* Bottom panel */
  #bottom-panel { background: var(--surface); flex-shrink: 0; }

  /* Tabs */
  #tabs { display: flex; border-bottom: 0.5px solid var(--border); padding: 0 16px; }
  .tab {
    flex: 1; padding: 11px 0; font-size: 13px; font-weight: 600;
    text-align: center; cursor: pointer;
    color: var(--text3); border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--green); }

  /* Panels */
  .panel { display: none; padding: 14px 16px; gap: 12px; flex-direction: column; }
  .panel.active { display: flex; }

  /* Stats */
  #stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat { background: var(--bg); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .stat-val { font-size: 19px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; line-height: 1; }
  .stat-unit { font-size: 11px; font-weight: 500; color: var(--text2); }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 13px; border-radius: var(--radius-sm);
    border: none; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: transform 0.1s, opacity 0.1s;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn-start { background: var(--green); color: white; }
  .btn-stop  { background: var(--red);   color: white; display: none; }
  .btn-ghost { background: var(--bg); color: var(--text2); font-weight: 600; border: 0.5px solid var(--border); }

  /* Status */
  #status { font-size: 12px; color: var(--text3); text-align: center; min-height: 16px; }
  .rec-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--red); animation: blink 1.2s ease-in-out infinite;
    margin-right: 4px; vertical-align: middle;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

  /* Tracks */
  #tracks-list { display: flex; flex-direction: column; gap: 8px; max-height: 180px; overflow-y: auto; }
  .track-item {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px;
  }
  .track-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .track-meta { font-size: 11px; color: var(--text3); }
  .track-actions { display: flex; gap: 5px; flex-shrink: 0; }
  .track-btn {
    font-size: 11px; font-weight: 600; padding: 5px 9px;
    border-radius: 6px; border: 0.5px solid var(--border);
    background: var(--surface); color: var(--text2); cursor: pointer;
  }
  .track-btn.show { background: var(--blue); color: white; border-color: var(--blue); }
  .empty-msg { font-size: 13px; color: var(--text3); text-align: center; padding: 16px 0; }
  .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom, 0px), 20px); }
  html { height: -webkit-fill-available; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>GPS Tracker</h1>
    <span class="badge">OpenStreetMap</span>
  </div>

  <div id="map"></div>

  <div id="bottom-panel">
    <div id="tabs">
      <div class="tab active" onclick="switchTab('record')">記録</div>
      <div class="tab" onclick="switchTab('tracks')">履歴</div>
    </div>

    <div id="panel-record" class="panel active safe-bottom">
      <div id="stats">
        <div class="stat">
          <div class="stat-label">距離</div>
          <div class="stat-val" id="stat-dist">0.0<span class="stat-unit">km</span></div>
        </div>
        <div class="stat">
          <div class="stat-label">時間</div>
          <div class="stat-val" id="stat-time">00:00</div>
        </div>
        <div class="stat">
          <div class="stat-label">速度</div>
          <div class="stat-val" id="stat-speed">—<span class="stat-unit">km/h</span></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-start" id="btn-start" onclick="startRecording()">記録開始</button>
        <button class="btn btn-stop"  id="btn-stop"  onclick="stopRecording()">記録停止</button>
      </div>
      <div id="status">GPS待機中</div>
    </div>

    <div id="panel-tracks" class="panel safe-bottom">
      <div id="tracks-list"><div class="empty-msg">保存済みルートはありません</div></div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="exportLatestGPX()">GPXエクスポート</button>
        <button class="btn btn-ghost" onclick="clearAll()">全削除</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// Map init
const map = L.map('map', { zoomControl: true }).setView([35.681, 139.767], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

// Current position marker (custom circle)
const posIcon = L.divIcon({
  className: '',
  html: '<div style="width:14px;height:14px;border-radius:50%;background:#1D9E75;border:2.5px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>',
  iconSize: [14, 14], iconAnchor: [7, 7]
});
let posMarker = null;

// State
let recording = false, watchId = null;
let points = [], startTime = null, timerInterval = null;
let activePolyline = null;
let tracks = JSON.parse(localStorage.getItem('gps_tracks_osm') || '[]');
let shownLayers = [];

// Try to go to user's location on load
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    map.setView([pos.coords.latitude, pos.coords.longitude], 15);
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['record', 'tracks'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'tracks') renderTracks();
}

function startRecording() {
  if (!navigator.geolocation) { alert('このブラウザはGPSに対応していません'); return; }
  recording = true; points = []; startTime = Date.now();

  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-stop').style.display = '';
  document.getElementById('stat-dist').innerHTML = '0.0<span class="stat-unit">km</span>';
  document.getElementById('stat-time').textContent = '00:00';
  document.getElementById('stat-speed').innerHTML = '—<span class="stat-unit">km/h</span>';

  // Clear previous shown layers
  clearShownLayers();

  activePolyline = L.polyline([], {
    color: '#1D9E75', weight: 5, opacity: 0.85, lineJoin: 'round', lineCap: 'round'
  }).addTo(map);

  watchId = navigator.geolocation.watchPosition(pos => {
    const pt = { lat: pos.coords.latitude, lng: pos.coords.longitude, ts: Date.now(), speed: pos.coords.speed };
    points.push(pt);

    const latlng = [pt.lat, pt.lng];
    activePolyline.addLatLng(latlng);

    if (!posMarker) {
      posMarker = L.marker(latlng, { icon: posIcon }).addTo(map);
    } else {
      posMarker.setLatLng(latlng);
    }
    map.panTo(latlng);

    if (points.length > 1) {
      document.getElementById('stat-dist').innerHTML = calcDist().toFixed(2) + '<span class="stat-unit">km</span>';
    }
    if (pt.speed != null && pt.speed >= 0) {
      document.getElementById('stat-speed').innerHTML = Math.round(pt.speed * 3.6) + '<span class="stat-unit">km/h</span>';
    }
    document.getElementById('status').innerHTML = '<span class="rec-dot"></span>記録中 (' + points.length + 'ポイント)';
  }, err => {
    let msg = 'GPS取得エラー';
    if (err.code === 1) msg = 'GPS権限を許可してください（設定 → Safari → 位置情報）';
    else if (err.code === 2) msg = 'GPS信号が取得できません';
    document.getElementById('status').textContent = msg;
  }, { enableHighAccuracy: true, maximumAge: 3000, timeout: 20000 });

  timerInterval = setInterval(updateTimer, 1000);
}

function stopRecording() {
  if (watchId != null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  clearInterval(timerInterval);
  recording = false;
  document.getElementById('btn-start').style.display = '';
  document.getElementById('btn-stop').style.display = 'none';

  if (points.length < 2) {
    document.getElementById('status').textContent = 'ポイントが少なすぎます（もう少し走ってください）';
    return;
  }

  const dist = calcDist();
  const dur = Math.round((Date.now() - startTime) / 1000);
  const now = new Date();
  const name = now.toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' }) + ' ' +
    now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) + 'のツーリング';

  tracks.unshift({ name, points, dist, dur, date: now.toISOString() });
  try { localStorage.setItem('gps_tracks_osm', JSON.stringify(tracks)); } catch(e) {}
  document.getElementById('status').textContent = '保存完了 — ' + dist.toFixed(2) + 'km / ' + fmtDur(dur);
}

function calcDist() {
  let d = 0;
  for (let i = 1; i < points.length; i++) {
    const R = 6371, a = points[i-1], b = points[i];
    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLng = (b.lng - a.lng) * Math.PI / 180;
    const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
    d += R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
  }
  return d;
}

function updateTimer() {
  const s = Math.round((Date.now() - startTime) / 1000);
  document.getElementById('stat-time').textContent =
    String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
}

function fmtDur(s) {
  if (s < 60) return s + '秒';
  const m = Math.floor(s / 60), h = Math.floor(m / 60);
  return h > 0 ? h + '時間' + (m % 60) + '分' : m + '分';
}

function renderTracks() {
  const el = document.getElementById('tracks-list');
  if (!tracks.length) { el.innerHTML = '<div class="empty-msg">保存済みルートはありません</div>'; return; }
  el.innerHTML = tracks.map((t, i) => `
    <div class="track-item">
      <div style="min-width:0;overflow:hidden">
        <div class="track-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.name}</div>
        <div class="track-meta">${t.dist.toFixed(2)}km · ${fmtDur(t.dur)} · ${t.points.length}pt</div>
      </div>
      <div class="track-actions">
        <button class="track-btn show" onclick="showTrack(${i})">表示</button>
        <button class="track-btn" onclick="exportGPX(${i})">GPX</button>
        <button class="track-btn" onclick="deleteTrack(${i})">削除</button>
      </div>
    </div>`).join('');
}

function clearShownLayers() {
  shownLayers.forEach(l => map.removeLayer(l));
  shownLayers = [];
}

function showTrack(i) {
  const t = tracks[i];
  clearShownLayers();

  const line = L.polyline(t.points.map(p => [p.lat, p.lng]), {
    color: '#378ADD', weight: 5, opacity: 0.8, lineJoin: 'round', lineCap: 'round'
  }).addTo(map);
  shownLayers.push(line);

  // Start marker (green)
  const startDot = L.divIcon({
    className: '',
    html: '<div style="width:12px;height:12px;border-radius:50%;background:#1D9E75;border:2.5px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>',
    iconSize: [12,12], iconAnchor: [6,6]
  });
  // End marker (red)
  const endDot = L.divIcon({
    className: '',
    html: '<div style="width:12px;height:12px;border-radius:50%;background:#D85A30;border:2.5px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>',
    iconSize: [12,12], iconAnchor: [6,6]
  });
  const sm = L.marker([t.points[0].lat, t.points[0].lng], { icon: startDot }).addTo(map);
  const em = L.marker([t.points[t.points.length-1].lat, t.points[t.points.length-1].lng], { icon: endDot }).addTo(map);
  shownLayers.push(sm, em);

  map.fitBounds(line.getBounds(), { padding: [24, 24] });
  switchTab('record');
  document.getElementById('status').textContent = t.name + ' を表示中';
}

function deleteTrack(i) {
  if (!confirm('このルートを削除しますか？')) return;
  tracks.splice(i, 1);
  try { localStorage.setItem('gps_tracks_osm', JSON.stringify(tracks)); } catch(e) {}
  renderTracks();
}

function buildGPX(t) {
  const trkpts = t.points.map(p =>
    `<trkpt lat="${p.lat}" lon="${p.lng}"><time>${new Date(p.ts).toISOString()}</time></trkpt>`
  ).join('\n      ');
  return `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="GPS Tracker (OSM)"
  xmlns="http://www.topografix.com/GPX/1/1">
  <trk>
    <name>${t.name}</name>
    <trkseg>
      ${trkpts}
    </trkseg>
  </trk>
</gpx>`;
}

function exportGPX(i) {
  const blob = new Blob([buildGPX(tracks[i])], { type: 'application/gpx+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = tracks[i].name.replace(/[\/\\:*?"<>|]/g, '_') + '.gpx';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function exportLatestGPX() {
  if (!tracks.length) { alert('エクスポートするルートがありません'); return; }
  exportGPX(0);
}

function clearAll() {
  if (!confirm('保存済みルートをすべて削除しますか？')) return;
  tracks = [];
  try { localStorage.removeItem('gps_tracks_osm'); } catch(e) {}
  clearShownLayers();
  renderTracks();
}
</script>
</body>
</html>
